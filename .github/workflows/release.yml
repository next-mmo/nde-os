name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps ──────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Rust ─────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # ── Node + pnpm ──────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Sync workspace versions to Release Tag
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting bundle version to: $VERSION"
          python3 -c "import json, re;
          version = '$VERSION';
          def up_json(p, k):
              with open(p, 'r') as f: d=json.load(f)
              if k in d: d[k] = version
              with open(p, 'w') as f: json.dump(d, f, indent=2)
          up_json('desktop/package.json', 'version')
          up_json('desktop/src-tauri/tauri.conf.json', 'version')
          with open('desktop/src-tauri/Cargo.toml', 'r') as f: c = f.read()
          c = re.sub(r'(?m)^version\s*=\s*\".*?\"', f'version = \"{version}\"', c, count=1)
          with open('desktop/src-tauri/Cargo.toml', 'w') as f: f.write(c)
          "

      # ── Build Tauri ──────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'AI Launcher ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            ## NDE-OS AI Launcher ${{ inputs.tag || github.ref_name }}

            Cross-platform sandboxed AI app manager with OpenViking context database.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` / `.exe` |
            | macOS    | `.dmg` |
            | Linux    | `.deb` / `.AppImage` |

            ### ⚠️ macOS Users
            If you do not have to sign with an Apple Developer certificate, macOS will block the app as "damaged" due to Gatekeeper quarantine. To fix this, run the following command in your Terminal after moving the app to your Applications folder:
            
            ```bash
            xattr -cr "/Applications/AI Launcher.app"
            ```
            You can then open the app normally.

            ### What's New
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
