[package]
name = "ai-launcher-core"
version = "0.2.0"
edition = "2021"
description = "Shared core library: sandbox, uv_env, app_manager, manifest"

[dependencies]
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
anyhow = "1.0.81"
chrono = "0.4.35"
sysinfo = { version = "0.30.13", default-features = false }

[dev-dependencies]
tempfile = "3"
